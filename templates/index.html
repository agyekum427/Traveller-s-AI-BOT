<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BuddyAI - Python NLP</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>

    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <h2><i class="fa-solid fa-robot"></i>  TRAVELLER'S AI</h2>
            </div>
            
            <div class="sidebar-menu">
                <a href="#" class="menu-item active">
                    <i class="fa-regular fa-message"></i>
                    <span>Chat</span>
                </a>
                <a href="#" class="menu-item">
                    <i class="fa-solid fa-brain"></i>
                    <span>NLP Engine</span>
                </a>
                <a href="#" class="menu-item">
                    <i class="fa-solid fa-code"></i>
                    <span>Source Code</span>
                </a>
            </div>

            <!-- Recent chat history -->
            <div class="sidebar-history">
                <div class="sidebar-history-header">
                    <span><i class="fa-solid fa-clock-rotate-left"></i> Recent Chats</span>
                    <button class="clear-btn" onclick="clearChat()" title="Clear chat history">
                        <i class="fa-solid fa-trash"></i>
                    </button>
                </div>
                <div id="history-list"><p class="no-history">Loading…</p></div>
            </div>

            <div class="sidebar-footer">
                <p>Version 2.0.0</p>
                <p>CHATGPT · Wikipedia</p>
            </div>
        </aside>

        <!-- Main Chat Area -->
        <main class="chat-container">
            <div class="chat-header">
                <div class="header-info">
                    <div class="avatar">
                        <i class="fa-solid fa-robot"></i>
                        <span class="status-indicator"></span>
                    </div>
                    <div>
                        <h3>TRAVELLER'S AI</h3>
                        <p>Online - Ready to help</p>
                    </div>
                </div>
                <div class="header-actions">
                    <button class="icon-btn" id="voice-toggle" onclick="toggleVoice()" title="Enable voice output"><i class="fa-solid fa-volume-xmark"></i></button>
                    <button class="icon-btn" title="Settings"><i class="fa-solid fa-ellipsis-vertical"></i></button>
                </div>
            </div>
            
            <div class="chat-messages" id="chat-messages">
                <!-- Messages will be appended here by JS -->
                <div class="message bot-message">
                    <div class="message-content">
                        <p>Hello! I am TRAVELLER'S AI. How can I assist you today?</p>
                        <span class="time" id="init-time"></span>
                    </div>
                </div>
            </div>

            <div class="typing-indicator" id="typing-indicator" style="display: none;">
                <div class="dot"></div>
                <div class="dot"></div>
                <div class="dot"></div>
            </div>

            <div class="chat-input-area">
                <form id="chat-form">
                    <div class="input-wrapper">
                        <button type="button" class="icon-btn tooltip" id="attach-btn" title="Upload text or PDF file"><i class="fa-solid fa-paperclip"></i></button>
                        <input type="file" id="file-input" accept=".txt,.md,.json,.csv,.py,.js,.html,.css,.xml,.yml,.yaml,.pdf" hidden>
                        <input type="text" id="user-input" placeholder="Type a message…" autocomplete="off" required>
                        <button type="button" class="icon-btn mic-btn" id="mic-btn" title="Voice input"><i class="fa-solid fa-microphone"></i></button>
                        <button type="submit" class="send-btn" id="send-btn">
                            <i class="fa-solid fa-paper-plane"></i>
                        </button>
                    </div>
                </form>
            </div>
        </main>
    </div>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
    <script>
        document.getElementById('init-time').innerText = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    </script>
</body>
</html>
