services:
  - type: web
    name: buddyai-chatbot
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn --bind 0.0.0.0:$PORT app:app
    envVars:
      - key: HF_MODEL
        value: meta-llama/Llama-3.1-8B-Instruct
      - key: HF_TOKEN
        sync: false
